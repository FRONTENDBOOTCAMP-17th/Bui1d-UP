<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>비밀번호 재설정 | Bui1dBox</title>
    <link rel="stylesheet" href="../../styles/theme.css" />
    <link rel="stylesheet" href="../../components/input.css" />
    <link rel="stylesheet" href="../../components/button.css" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" />
  </head>
  <body
    class="min-h-screen flex bg-(--background-base,#171717) text-(--text-primary,#ffffff)"
  >
    <!-- LEFT -->
    <div
      class="hidden md:flex w-1/2 flex-col justify-center items-start p-25 pl-35 relative overflow-hidden"
      aria-hidden="true"
    >
      <!-- 그라디언트 오버레이 -->
      <div
        class="absolute inset-0 pointer-events-none"
        style="
          background: radial-gradient(
            ellipse 80% 60% at 20% 50%,
            rgba(229, 9, 20, 0.18) 0%,
            transparent 55%
          );
        "
      ></div>
      <!-- 콘텐츠 -->
      <div class="relative z-10 animationLeft">
        <!-- 로고 -->
        <div class="flex items-center gap-3 mb-8">
          <img src="/logo.webp" alt="Bui1dBox 로고" class="header-logo" />
        </div>

        <p class="heading-left-text">
          <span style="white-space: nowrap">비밀번호를</span>
          <span style="white-space: nowrap">잊으셨나요?</span>
        </p>
        <p class="subtext-left-text gap-3">
          <span style="white-space: nowrap">걱정하지 마세요!</span>
          <span style="white-space: nowrap">
            <span id="welcome-nickname" class="text-(--color-primary,#dc2626)"
              >Bui1dBox</span
            >에서 도와드릴게요.</span
          ><br />
          <span style="white-space: nowrap">이메일 본인 인증 후,</span>
          <span style="white-space: nowrap"
            >비밀번호를 재설정할 수 있어요.</span
          >
        </p>
      </div>
    </div>

    <!-- RIGHT -->
    <main
      class="w-full md:w-1/2 flex flex-col justify-center items-center p-6 md:p-10 overflow-x-hidden animationRight"
    >
      <div
        class="w-full max-w-150 p-12 rounded-lg backdrop-blur-lg bg-[linear-gradient(to_bottom,var(--background-surface,#262626),var(--background-base,#171717)_60%)]"
      >
        <!-- 모바일 로고 -->
        <div class="flex md:hidden items-center gap-3 mb-8">
          <img
            src="/logo.webp"
            alt=""
            aria-hidden="true"
            class="header-logo-mobile"
          />
        </div>

        <!-- 로그인 링크 -->
        <div class="flex justify-end items-center gap-2.5 mb-8">
          <span class="text-sm text-(--text-secondary,#737373)"
            >비밀번호가 기억나시나요?</span
          >
          <a
            href="../login/login.html"
            class="text-sm text-(--color-primary,#dc2626) font-medium transition-colors duration-150 hover:text-(--text-primary,#ffffff)"
            >로그인</a
          >
        </div>

        <h1 class="heading-right-text" id="form-title">비밀번호 재설정</h1>

        <form
          id="reset-password-form"
          novalidate
          aria-labelledby="form-title"
          class="flex flex-col gap-1.5"
        >
          <!-- 이메일 -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-medium pb-1" for="email"
              >회원가입 시 입력했던 이메일</label
            >
            <div class="flex gap-2">
              <div class="form-input flex-1">
                <input
                  type="email"
                  id="email"
                  name="email"
                  placeholder=" "
                  autocomplete="email"
                  aria-describedby="email-hint"
                  required
                />
                <label for="email" aria-hidden="true"
                  >이메일 주소를 입력하세요.</label
                >
                <button
                  type="button"
                  class="action-btn clear"
                  id="email-clear"
                  aria-label="이메일 입력값 삭제"
                >
                  <svg
                    width="18"
                    height="18"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <use href="../../assets/icons/sprite.svg#icon-x" />
                  </svg>
                </button>
              </div>
              <!-- 인증코드 발송 버튼 -->
              <button
                type="button"
                id="send-code-btn"
                class="border-0 shrink-0 h-13 px-4 rounded-lg text-sm font-semibold cursor-pointer transition-[background] duration-150 active:scale-[0.99] button-primary"
              >
                인증코드 발송
              </button>
            </div>
            <p class="text-hint" id="email-hint" aria-live="polite">
              이메일 주소를 입력하세요.
            </p>
          </div>

          <!-- 인증 코드 -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-medium pb-1" for="email-code"
              >인증 코드</label
            >
            <div class="flex gap-2">
              <div class="form-input flex-1">
                <input
                  type="text"
                  id="email-code"
                  name="email-code"
                  placeholder=" "
                  autocomplete="one-time-code"
                  aria-describedby="email-code-hint"
                  required
                />
                <label for="email-code" aria-hidden="true"
                  >이메일로 발송된 4자리 코드를 입력하세요.</label
                >
                <button
                  type="button"
                  class="action-btn clear"
                  id="email-code-clear"
                  aria-label="인증 코드 입력값 삭제"
                >
                  <svg
                    width="18"
                    height="18"
                    aria-hidden="true"
                    focusable="false"
                  >
                    <use href="../../assets/icons/sprite.svg#icon-x" />
                  </svg>
                </button>
              </div>
              <!-- 확인 버튼 -->
              <button
                type="button"
                id="verify-code-btn"
                class="border-0 shrink-0 h-13 px-4 rounded-lg text-sm font-semibold cursor-pointer transition-[background] duration-150 active:scale-[0.99] button-primary"
              >
                확인
              </button>
            </div>
            <p class="text-hint" id="email-code-hint" aria-live="polite">
              이메일로 발송된 4자리 코드를 입력하세요.
            </p>
          </div>

          <!-- 새 비밀번호 -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-medium pb-1" for="new-password"
              >새 비밀번호</label
            >
            <div class="form-input">
              <input
                type="password"
                id="new-password"
                name="new-password"
                class="has-two-actions"
                placeholder=" "
                autocomplete="new-password"
                aria-describedby="new-password-hint"
                required
              />
              <label for="new-password" aria-hidden="true"
                >8~50자, 영문 대문자+숫자+특수문자</label
              >
              <button
                type="button"
                class="action-btn toggle"
                id="new-password-toggle"
                aria-label="새 비밀번호 표시"
                aria-pressed="false"
              >
                <svg width="18" height="12" aria-hidden="true" focusable="false">
                  <use href="../../assets/icons/sprite.svg#icon-eye" />
                </svg>
                <svg
                  width="22"
                  height="22"
                  aria-hidden="true"
                  focusable="false"
                  style="display: none"
                >
                  <use href="../../assets/icons/sprite.svg#icon-eye-hide" />
                </svg>
              </button>
              <button
                type="button"
                class="action-btn clear"
                id="new-password-clear"
                aria-label="새 비밀번호 입력값 삭제"
              >
                <svg width="18" height="18" aria-hidden="true" focusable="false">
                  <use href="../../assets/icons/sprite.svg#icon-x" />
                </svg>
              </button>
            </div>
            <p class="text-hint" id="new-password-hint" aria-live="polite">
              8~50자, 대문자·숫자·특수문자를 포함해야 합니다.
            </p>
          </div>

          <!-- 비밀번호 확인 -->
          <div class="flex flex-col gap-1.5">
            <label class="text-sm font-medium pb-1" for="password-check"
              >비밀번호 확인</label
            >
            <div class="form-input">
              <input
                type="password"
                id="password-check"
                name="password-check"
                class="has-two-actions"
                placeholder=" "
                autocomplete="new-password"
                aria-describedby="password-check-hint"
                required
              />
              <label for="password-check" aria-hidden="true"
                >비밀번호를 다시 입력하세요.</label
              >
              <button
                type="button"
                class="action-btn toggle"
                id="password-check-toggle"
                aria-label="비밀번호 확인 표시"
                aria-pressed="false"
              >
                <svg width="18" height="12" aria-hidden="true" focusable="false">
                  <use href="../../assets/icons/sprite.svg#icon-eye" />
                </svg>
                <svg
                  width="22"
                  height="22"
                  aria-hidden="true"
                  focusable="false"
                  style="display: none"
                >
                  <use href="../../assets/icons/sprite.svg#icon-eye-hide" />
                </svg>
              </button>
              <button
                type="button"
                class="action-btn clear"
                id="password-check-clear"
                aria-label="비밀번호 확인 입력값 삭제"
              >
                <svg width="18" height="18" aria-hidden="true" focusable="false">
                  <use href="../../assets/icons/sprite.svg#icon-x" />
                </svg>
              </button>
            </div>
            <p class="text-hint" id="password-check-hint" aria-live="polite">
              비밀번호를 다시 입력하세요.
            </p>
          </div>

          <!-- 비밀번호 재설정 버튼 -->
          <button
            type="submit"
            class="border-0 w-full h-13 rounded-lg text-[0.95rem] font-semibold mt-4 cursor-pointer transition-[background] duration-150 active:scale-[0.99] button-primary"
          >
            비밀번호 재설정
          </button>
        </form>

        <!-- 구분선 -->
        <div
          aria-hidden="true"
          class="flex items-center my-6 text-(--text-tertiary,#d4d4d4)/80 text-sm"
        >
          <div class="flex-1 border-t border-(--text-tertiary,#d4d4d4)/30"></div>
          <span class="mx-3">또는</span>
          <div class="flex-1 border-t border-(--text-tertiary,#d4d4d4)/30"></div>
        </div>

        <!-- 홈 버튼 -->
        <a
          href="../../landing/landing.html"
          class="flex items-center justify-center w-full h-10 rounded-lg text-[0.95rem] font-semibold mt-3 border-0 bg-transparent text-(--text-secondary,#737373) cursor-pointer transition-colors duration-150 hover:text-(--text-primary,#ffffff) active:scale-[0.99]"
          >처음으로 돌아가기</a
        >
      </div>
    </main>

    <script type="module" src="./resetPassword.js"></script>
  </body>
</html>
