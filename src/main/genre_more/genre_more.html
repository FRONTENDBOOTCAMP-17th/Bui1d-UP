<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>장르별 모아보기</title>
    <link rel="icon" type="image/png" href="/favicon-16x16.png" />
    <link rel="preload" as="font" href="/font/suit/SUIT-Variable.woff2" />
    <link rel="stylesheet" href="/font/suit/SUIT-Variable.css" />
    <link rel="stylesheet" href="./genre_more.css" />
  </head>
  <body class="bg-[#171717] text-white m-0">
    <main class="w-full px-8 py-3 box-border">
      <div class="flex flex-col items-start">
        <button class="bg-transparent border-0 text-base cursor-pointer text-gray-500" id="back-btn">‹ 뒤로</button>
        <h1 class="text-[2.5rem] font-bold mb-2.5" id="genre-title"></h1>
      </div>
      <div id="no-data" class="hidden text-[#e5e5e5] text-center py-20 text-lg">작성한 영화후기가 없습니다. 지금 후기를 작성해보세요!</div>
      <div class="grid grid-cols-2 gap-3 md:grid-cols-5 md:gap-4" id="genre-more-grid"></div>
      <div class="flex justify-center mt-8">
        <button class="bg-transparent border border-[#525252] text-[#d4d4d4] py-2.5 px-8 rounded-[20px] text-sm cursor-pointer disabled:text-[#525252] disabled:border-[#404040] disabled:cursor-default" id="load-more-btn">더보기</button>
      </div>
    </main>

    <script type="module" src="./genre_more.js"></script>
  </body>
</html>
