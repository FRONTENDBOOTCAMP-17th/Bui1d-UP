<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="stylesheet" href="../../styles/theme.css" />
    <link rel="stylesheet" href="./detail.css" />
    <title>영화 상세</title>
  </head>
  <body>
    <header class="top-bar">
      <nav>
        <button class="back-btn" id="backBtn">← 뒤로가기</button>
      </nav>
    </header>

    <main class="detail-layout">
      <!-- 데스크탑 전용: 패널 열릴 때 배경 블러 오버레이 -->
      <div class="backdrop-overlay" id="backdropOverlay"></div>

      <!-- ① 배경 영역
           모바일 : <img>가 보임, background-image 없음
           데스크탑: <img> 숨김, JS가 backdrop_path를 background-image로 주입 -->
      <section class="backdrop" id="backdrop">
        <img
          class="backdrop-img"
          id="backdropImg"
          src=""
          alt="영화 배경 이미지"
        />

        <!-- 모바일에서는 이미지 아래, 데스크탑에서는 좌하단 오버레이 -->
        <div class="hero-info">
          <h1 id="title"></h1>
          <div class="hero-meta">
            <span id="year"></span>
            <div class="rating">
              <img src="/public/star.svg" alt="별점" />
              <span id="rating"></span>
            </div>
          </div>
          <!-- 데스크탑 전용 버튼: 패널 열기 -->
          <button class="detail-btn" id="detailBtn" type="button">
            ≡ 상세 정보
          </button>
        </div>
      </section>

      <!-- ② 상세 정보 패널
           모바일 : 항상 아래에 펼쳐져 있음 (세로 스크롤)
           데스크탑: 우측에서 슬라이드 인, 패널 열기 버튼으로 토글 -->
      <aside class="detail-panel" id="detailPanel">
        <!-- 데스크탑 전용 닫기 버튼 -->
        <button class="close-btn" id="closeBtn" type="button">✕</button>

        <!-- 데스크탑 패널 안 포스터 썸네일 (모바일에서는 숨김) -->
        <figure class="poster-wrap">
          <img id="poster" src="" alt="영화 포스터" />
        </figure>

        <h2 id="panelTitle"></h2>

        <div class="panel-rating">
          <img src="/public/star.svg" alt="별점" />
          <span id="panelRating"></span>
        </div>

        <dl class="movie-meta">
          <div class="meta-row">
            <dt>개봉 연도</dt>
            <dd id="panelYear"></dd>
          </div>
          <div class="meta-row">
            <dt>장르</dt>
            <dd id="genre"></dd>
          </div>
          <div class="meta-row">
            <dt>감독</dt>
            <dd id="director"></dd>
          </div>
          <div class="meta-row">
            <dt>출연진</dt>
            <dd id="cast"></dd>
          </div>
        </dl>

        <hr />

        <section class="quotes">
          <h3>명대사</h3>
          <ul id="quoteList"></ul>
        </section>

        <div class="w-full flex justify-center gap-6 mt-4">
          <a
            id="editLink"
            class="border-0 rounded-lg box-border items-center inline-flex button-responsive"
            href="../../paragraph/edit/edit.html?id="
          >
            <span class="hidden min-[768px]:inline text-sm">수정하기</span>
          </a>
          <button
            type="button"
            id="delete_btn"
            class="border-0 rounded-lg box-border items-center inline-flex button-primary button-responsive"
            aria-label="새 리뷰 작성"
          >
            <span class="hidden min-[768px]:inline text-sm">삭제하기</span>
          </button>
        </div>
      </aside>
    </main>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
