<!doctype html>
<html lang="ko-KR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/favicon-16x16.png" />
    <link rel="stylesheet" href="../../styles/theme.css" />
    <link rel="stylesheet" href="./detail.css" />
    <title>영화 상세</title>
  </head>
  <body>
    <header class="top-bar flex items-center justify-between py-4 px-5 absolute top-0 left-0 w-full z-10">
      <nav>
        <button class="bg-transparent border-0 text-base cursor-pointer text-gray-500 back-btn" id="backBtn">← 뒤로가기</button>
      </nav>
    </header>

    <main class="detail-layout block">
      <!-- 데스크탑 전용: 패널 열릴 때 배경 블러 오버레이 -->
      <div class="backdrop-overlay" id="backdropOverlay"></div>

      <!-- 모바일: <img> 표시, 데스크탑: JS가 background-image 주입 -->
      <section class="backdrop relative w-full" id="backdrop">
        <img
          class="backdrop-img w-full block aspect-[16/9] object-cover"
          id="backdropImg"
          src=""
          alt="영화 배경 이미지"
        />

        <div class="hero-info">
          <h1 class="text-[28px] font-bold mb-2" id="title"></h1>
          <div class="flex items-center gap-3 text-sm text-[#aaa] hero-meta">
            <span id="year"></span>
            <div class="flex items-center gap-1 text-[#f5c518] font-bold">
              <img src="/star.svg" alt="별점" class="w-4 h-4" />
              <span id="rating"></span>
            </div>
          </div>
          <button class="detail-btn" id="detailBtn" type="button">
            ≡ 상세 정보
          </button>
        </div>
      </section>

      <aside class="detail-panel" id="detailPanel">
        <button class="close-btn bg-transparent border-0 text-[#ccc] text-xl cursor-pointer" id="closeBtn" type="button">✕</button>

        <figure class="poster-wrap">
          <img id="poster" src="" alt="영화 포스터" class="w-full rounded-lg object-cover aspect-[2/3]" />
        </figure>

        <h2 class="text-[22px] font-bold mb-2" id="panelTitle"></h2>

        <div class="flex items-center gap-1.5 text-[#f5c518] text-lg font-bold mb-5">
          <img src="/star.svg" alt="별점" class="w-[18px] h-[18px]" />
          <span id="panelRating"></span>
        </div>

        <dl class="grid grid-cols-2 gap-y-4 mb-5 movie-meta">
          <div>
            <dt class="text-xs text-[#888] mb-1">개봉 연도</dt>
            <dd class="text-sm text-white" id="panelYear"></dd>
          </div>
          <div>
            <dt class="text-xs text-[#888] mb-1">장르</dt>
            <dd class="text-sm text-white" id="genre"></dd>
          </div>
          <div>
            <dt class="text-xs text-[#888] mb-1">감독</dt>
            <dd class="text-sm text-white" id="director"></dd>
          </div>
          <div>
            <dt class="text-xs text-[#888] mb-1">출연진</dt>
            <dd class="text-sm text-white" id="cast"></dd>
          </div>
        </dl>

        <hr />

        <section class="quotes">
          <h3 class="text-sm text-[#888] mb-3">명대사</h3>
          <ul class="list-none flex flex-col gap-3" id="quoteList"></ul>
        </section>

        <hr />

        <section class="mt-1">
          <h3 class="text-sm text-[#888] mb-3">후기</h3>
          <p class="text-sm text-[#ccc] leading-7 whitespace-pre-wrap bg-[#1a1a1a] rounded-lg p-4 border-l-2 border-[#e50914]" id="reviewContent"></p>
        </section>

        <div class="w-full flex justify-center gap-6 mt-8">
          <a
            id="editLink"
            class="border rounded-lg box-border items-center inline-flex button-responsive"
            href="../../paragraph/edit/edit.html?id="
          >
            <span class="text-sm">수정하기</span>
          </a>
          <button
            type="button"
            id="delete_btn"
            class="border-0 rounded-lg box-border items-center inline-flex button-primary button-responsive"
            aria-label="삭제버튼"
          >
            <span class="text-sm">삭제하기</span>
          </button>
        </div>
      </aside>
    </main>

    <script type="module" src="./detail.js"></script>
  </body>
</html>
