<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>포스트 수정</title>

    <style>
      body {
        background: #0b0b0b;
        color: white;
        font-family: Arial;
        padding: 30px;
      }

      .wrapper {
        max-width: 1200px;
        margin: auto;
      }

      .header {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .container {
        display: flex;
        gap: 40px;
        align-items: flex-start;
      }

      .left {
        flex: 1;
        display: flex;
        flex-direction: column;
        max-width: 400px;
        gap: 10px;
      }
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        min-height: 500px; /*  추가 */
      }
      input,
      textarea {
        width: 100%;
        background: #1c1c1c;
        border: none;
        padding: 10px;
        margin-top: 10px;
        color: white;
        border-radius: 5px;
      }

      textarea {
        height: 200px;
      }

      .preview {
        width: 100%;
        max-width: 300px;
        aspect-ratio: 2 / 3;
        height: auto;
        background: #222;
        margin-top: 10px;
        object-fit: cover;
        display: block;
      }

      .rating-box {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .star {
        font-size: 20px;
        color: #555;
      }

      .star.active {
        color: gold;
      }

      .genres {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px 40px;
        margin-top: 10px;
        margin-bottom: 20px;
      }

      .genres label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .genres input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }

      .genres span {
        white-space: nowrap;
      }

      .buttons {
        margin-top: 30px;
        text-align: right;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
      }

      .submit {
        background: #e50914;
        color: white;
      }

      .cancel {
        background: #444;
        color: white;
        margin-right: 10px;
      }

      .top-header {
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #222;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }

      .back-btn {
        color: #aaa;
        cursor: pointer;
        font-size: 14px;
      }

      .back-btn:hover {
        color: white;
      }
      #ratingRange {
        flex: 0 0 200px;
        width: 85%; /* ← 핵심 */
        accent-color: gold;
        cursor: pointer;
        margin-right: -10px;
      }
      #ratingValue {
        margin-left: 2px;
        font-weight: bold;
        margin-left: 4px;
      }
      .title {
        font-size: 20px;
        font-weight: bold;
      }
      input,
      textarea {
        border: 1px solid transparent;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border: 1px solid #e50914;
      }
      .textarea-wrapper {
        position: relative;
      }

      .char-count {
        position: absolute;
        bottom: 8px;
        right: 10px;
        font-size: 12px;
        color: #aaa;
      }
      #content {
        height: 400px; /* 원하는 만큼 늘리기 */
      }
      .preview-wrapper {
        position: relative;
        width: 100%;
        max-width: 300px;
      }

      .preview-text {
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
        color: #aaa;
        font-size: 14px;
        pointer-events: none;
      }

      .preview.dragover {
        border: 2px dashed #e50914;
        background: rgba(229, 9, 20, 0.1);
      }
      /*  반응형 (모바일) */
      @media (max-width: 767px) {
        .container {
          flex-direction: column; /*  핵심 */
          gap: 20px;
        }

        .preview {
          width: 100%; /* 이미지 꽉 채우기 */
          height: auto;
        }

        .genres {
          grid-template-columns: repeat(1, 1fr); /* 2열 → 1열 */
        }

        .buttons {
          text-align: center;
        }

        button {
          width: 100%; /* 버튼 꽉 채우기 */
          margin-top: 10px;
        }

        .top-header {
          flex-direction: column; /* 나가기 + 제목 세로 */
          align-items: flex-start;
          gap: 5px;
        }
      }
      .drop-zone {
        width: 100%;
        max-width: 300px;
        height: 80px;
        border: 2px dashed #555;
        border-radius: 8px;
        color: #aaa;
        display: flex;
        align-items: center;
        justify-content: center;
        margin-top: 10px;
        font-size: 14px;
        cursor: pointer;
      }

      .drop-zone.dragover {
        border-color: #e50914;
        color: white;
        background: rgba(229, 9, 20, 0.1);
      }
      @media (min-width: 768px) and (max-width: 1080px) {
        .container {
          flex-direction: row; /* 다시 가로 */
          gap: 20px;
        }

        .left,
        .right {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }
        .preview {
          width: 100%;
          height: auto;
          aspect-ratio: 2 / 3; /* 포스터 비율 */
        }

        .wrapper {
          padding: 0 20px;
        }

        input,
        textarea {
          font-size: 14px;
        }
        label {
          margin-top: 10px;
          display: block;
        }

        #ratingRange {
          flex: 0 0 180px;
        }
        .genres {
          gap: 10px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="top-header">
        <span class="back-btn" onclick="history.back()">← 나가기</span>
        <span class="title">영화 수정</span>
      </div>

      <div class="container">
        <!-- 좌측 -->
        <div class="left">
          <label>포스터 URL</label>
          <input id="poster" placeholder="이미지 URL 입력" />
          <input type="file" id="file" />
          <div class="preview-wrapper">
            <img id="preview" class="preview" />
            <span class="preview-text">이미지를 드래그하세요</span>
          </div>

          <label>영화 제목</label>
          <input id="title" placeholder="영화 제목을 입력하세요" />

          <label>별점</label>
          <div class="rating-box">
            <input
              type="range"
              id="ratingRange"
              min="0"
              max="5"
              step="0.5"
              value="0"
            />
            <span id="ratingValue">⭐ 0</span>
          </div>

          <label>개봉 연도</label>
          <input id="year" placeholder="예: 2024" />

          <label>장르</label>
          <div class="genres">
            <label
              ><input type="checkbox" value="animation" /><span
                >애니메이션</span
              ></label
            >
            <label
              ><input type="checkbox" value="comedy" /><span
                >코미디</span
              ></label
            >
            <label
              ><input type="checkbox" value="romance" /><span
                >로맨스</span
              ></label
            >
            <label
              ><input type="checkbox" value="action_thriller_crime" /><span
                >액션 / 스릴러 / 범죄</span
              ></label
            >
            <label
              ><input type="checkbox" value="horror" /><span>호러</span></label
            >
            <label
              ><input type="checkbox" value="sf_fantasy" /><span
                >SF / 판타지</span
              ></label
            >
            <label
              ><input type="checkbox" value="drama" /><span>드라마</span></label
            >
            <label
              ><input type="checkbox" value="documentary" /><span
                >다큐멘터리</span
              ></label
            >
            <label
              ><input type="checkbox" value="music_musical" /><span
                >음악 / 뮤지컬</span
              ></label
            >
            <label
              ><input type="checkbox" value="etc" /><span>기타</span></label
            >
          </div>

          <label>감독</label>
          <input
            id="director"
            placeholder="감독 이름 입력 (여러 명은 ,로 구분)"
          />

          <label>출연진</label>
          <input id="actors" placeholder="출연진 입력 (여러 명은 ,로 구분)" />
        </div>

        <!-- 우측 -->
        <div class="right">
          <label>명대사</label>
          <div class="textarea-wrapper">
            <textarea
              id="description"
              maxlength="500"
              placeholder="기억에 남는 명대사를 적어주세요"
            ></textarea>
            <div class="char-count" id="descCount">0/500자</div>
          </div>

          <label>나의 후기</label>
          <div class="textarea-wrapper">
            <textarea
              id="content"
              maxlength="1500"
              placeholder="영화에 대한 생각과 감상을 자유롭게 작성해주세요"
            ></textarea>
            <div class="char-count" id="contentCount">0/1500자</div>
          </div>
        </div>
      </div>

      <div class="buttons">
        <button type="button" class="cancel" id="cancelBtn">취소</button>
        <button class="submit" onclick="updateMovie()">수정하기</button>
      </div>
    </div>

    <script>
      const API = "https://api.fullstackfamily.com/api/buildup/v1/movies";
      const token = localStorage.getItem("token");

      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get("id");

      let rating = 0;

      /*  별점 */
      const ratingRange = document.getElementById("ratingRange");
      const ratingText = document.getElementById("ratingValue");

      ratingRange.addEventListener("input", () => {
        rating = ratingRange.value;
        ratingText.innerText = "⭐ " + Number(rating).toFixed(1);
      });
      /*  미리보기 */
      document.getElementById("poster").addEventListener("input", (e) => {
        document.getElementById("preview").src = e.target.value;
      });

      /*  기존 데이터 불러오기 */

      document.getElementById("file").addEventListener("change", (e) => {
        const file = e.target.files[0];
        if (!file) return;

        const preview = document.getElementById("preview");
        const poster = document.getElementById("poster");

        preview.src = URL.createObjectURL(file);

        /* URL 입력값 초기화 */
        poster.value = "";
      });

      async function getMovie() {
        const res = await fetch(`${API}/${postId}`, {
          headers: {
            Authorization: `Bearer ${token}`,
          },
        });

        const data = await res.json();
        const movie = data.data;

        poster.value = movie.imageUrl;
        preview.src = movie.imageUrl;
        title.value = movie.title;
        year.value = movie.year;
        director.value = movie.director?.join(", ") || "";
        actors.value = movie.cast?.join(", ") || "";
        description.value = movie.famousLine;
        content.value = movie.content;
        descCount.innerText = `${description.value.length}/500자`;
        contentCount.innerText = `${content.value.length}/1500자`;

        rating = movie.star;
        ratingRange.value = rating;
        ratingText.innerText = "⭐ " + rating;

        document.querySelectorAll("input[type=checkbox]").forEach((cb) => {
          if (movie.genre === cb.value) {
            cb.checked = true;
          }
        });
      }

      getMovie();

      /*  수정 */
      async function updateMovie() {
        let imageUrl = "";

        const fileInput = document.getElementById("file");

        /* 파일 업로드 우선 */
        if (fileInput && fileInput.files[0]) {
          const formData = new FormData();
          formData.append("file", fileInput.files[0]);

          const imgRes = await fetch(
            "https://api.fullstackfamily.com/api/buildup/v1/movies/images",
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`, // ⭐ 여기 token으로 수정
              },
              body: formData,
            },
          );

          if (!imgRes.ok) {
            const errorData = await imgRes.json();
            console.error("이미지 업로드 실패:", errorData);
            alert("이미지 업로드 실패");
            return;
          }

          const imgData = await imgRes.json();
          imageUrl = imgData.data.imageUrl;
        } else {
          /* 파일 없으면 URL 사용 */
          imageUrl = document.getElementById("poster").value || "";
        }
        const genre = document.querySelector(
          "input[type=checkbox]:checked",
        )?.value;
        const body = {};

        // 값 있는 것만 추가
        if (title.value) body.title = title.value;
        if (genre) body.genre = genre;
        if (content.value) body.content = content.value;

        if (rating && rating !== 0) {
          body.star = Number(rating);
        }
        // 이미지
        if (imageUrl) body.imageUrl = imageUrl;
        else if (poster.value) body.imageUrl = poster.value;

        // 연도
        if (year.value) body.year = Number(year.value);

        // 감독
        if (director.value) {
          body.director = director.value.split(",").map((v) => v.trim());
        }

        // 출연진
        if (actors.value) {
          body.cast = actors.value.split(",").map((v) => v.trim());
        }

        // 명대사
        if (description.value) {
          body.famousLine = description.value;
        }

        try {
          const res = await fetch(`${API}/${postId}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify(body),
          });

          if (!res.ok) {
            const errorData = await res.json();
            console.error("수정 실패:", errorData);
            alert(errorData.message || "수정 실패");
            return;
          }

          alert("수정 완료!");
          location.href = `/detail.html?id=${postId}`;
        } catch (err) {
          alert("수정 실패");
        }
      }
      ratingText.innerText = "⭐ 0.0";
      /* 글자수 카운트 */
      const desc = document.getElementById("description");
      const descCount = document.getElementById("descCount");

      desc.addEventListener("input", () => {
        descCount.innerText = `${desc.value.length}/500자`;
      });

      const contentInput = document.getElementById("content");
      const contentCount = document.getElementById("contentCount");

      contentInput.addEventListener("input", () => {
        contentCount.innerText = `${contentInput.value.length}/1500자`;
      });
      const dropZone = document.getElementById("preview");
      const fileInput = document.getElementById("file");

      /* 드래그 중 */
      dropZone.addEventListener("dragover", (e) => {
        e.preventDefault();
        dropZone.classList.add("dragover");
      });

      /* 드래그 나감 */
      dropZone.addEventListener("dragleave", () => {
        dropZone.classList.remove("dragover");
      });

      /* 드롭 */
      dropZone.addEventListener("drop", (e) => {
        e.preventDefault();
        dropZone.classList.remove("dragover");

        const file = e.dataTransfer.files[0];
        if (!file) return;

        const preview = document.getElementById("preview");
        const poster = document.getElementById("poster");

        preview.src = URL.createObjectURL(file);

        const dataTransfer = new DataTransfer();
        dataTransfer.items.add(file);
        fileInput.files = dataTransfer.files;

        poster.value = "";
      });

      document.getElementById("preview").onload = () => {
        const text = document.querySelector(".preview-text");
        if (text) text.style.display = "none";
      };
      function resetForm(event) {
        event.preventDefault();
        event.stopPropagation();
        const scrollY = window.scrollY; //  현재 위치 저장

        if (!confirm("작성한 내용을 모두 지우시겠습니까?")) return;

        // 1. input 초기화
        document.querySelectorAll("input").forEach((input) => {
          if (input.type === "file") {
            input.value = "";
          } else if (input.type === "checkbox") {
            input.checked = false;
          } else {
            input.value = "";
          }
        });

        // 2. textarea 초기화
        document.querySelectorAll("textarea").forEach((textarea) => {
          textarea.value = "";
        });

        // 3. 이미지 초기화
        const preview = document.getElementById("preview");
        preview.src = "";

        const text = document.querySelector(".preview-text");
        if (text) text.style.display = "block";

        // 4. 별점 초기화
        const ratingRange = document.getElementById("ratingRange");
        const ratingText = document.getElementById("ratingValue");

        ratingRange.value = 0;
        rating = 0;
        ratingText.innerText = "⭐ 0.0";

        // 5. 글자 수 초기화
        document.getElementById("descCount").innerText = "0/500자";
        document.getElementById("contentCount").innerText = "0/1500자";
        window.scrollTo(0, scrollY); //  위치 복원
      }
      const cancelBtn = document.getElementById("cancelBtn");

      // 포커스 이동 막기
      cancelBtn.addEventListener("mousedown", (e) => {
        e.preventDefault();
      });

      // 실제 실행
      cancelBtn.addEventListener("click", (e) => {
        resetForm(e);
      });
    </script>
  </body>
</html>
