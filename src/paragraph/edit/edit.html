<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <title>포스트 수정</title>

    <style>
      body {
        background: #0b0b0b;
        color: white;
        font-family: Arial;
        padding: 30px;
      }

      .wrapper {
        max-width: 1200px;
        margin: auto;
      }

      .header {
        font-size: 20px;
        margin-bottom: 20px;
      }

      .container {
        display: flex;
        gap: 40px;
        align-items: flex-start;
      }

      .left {
        flex: 1;
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .right {
        flex: 1;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 10px;
        min-height: 500px; /*  추가 */
      }
      input,
      textarea {
        width: 100%;
        background: #1c1c1c;
        border: none;
        padding: 10px;
        margin-top: 10px;
        color: white;
        border-radius: 5px;
      }

      textarea {
        height: 140px;
      }

      .preview {
        width: 150px;
        height: 200px;
        background: #222;
        margin-top: 10px;
        object-fit: cover;
        display: block;
      }

      .rating-box {
        display: flex;
        align-items: center;
        gap: 6px;
      }
      .star {
        font-size: 20px;
        color: #555;
      }

      .star.active {
        color: gold;
      }

      .genres {
        display: grid;
        grid-template-columns: repeat(2, 1fr);
        gap: 12px 40px;
        margin-top: 10px;
        margin-bottom: 20px;
      }

      .genres label {
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 14px;
        cursor: pointer;
      }

      .genres input[type="checkbox"] {
        width: 16px;
        height: 16px;
      }

      .genres span {
        white-space: nowrap;
      }

      .buttons {
        margin-top: 30px;
        text-align: right;
      }

      button {
        padding: 10px 20px;
        border: none;
        border-radius: 5px;
      }

      .submit {
        background: #e50914;
        color: white;
      }

      .cancel {
        background: #444;
        color: white;
        margin-right: 10px;
      }

      .top-header {
        display: flex;
        align-items: center;
        gap: 15px;
        border-bottom: 1px solid #222;
        padding-bottom: 10px;
        margin-bottom: 20px;
      }

      .back-btn {
        color: #aaa;
        cursor: pointer;
        font-size: 14px;
      }

      .back-btn:hover {
        color: white;
      }
      #ratingRange {
        flex: 0 0 200px;
        width: 85%; /* ← 핵심 */
        accent-color: gold;
        cursor: pointer;
        margin-right: -10px;
      }
      #ratingValue {
        margin-left: 2px;
        font-weight: bold;
        margin-left: 4px;
      }
      .title {
        font-size: 20px;
        font-weight: bold;
      }
      input,
      textarea {
        border: 1px solid transparent;
      }

      input:focus,
      textarea:focus {
        outline: none;
        border: 1px solid #e50914;
      }
      /*  반응형 (모바일) */
      @media (max-width: 767px) {
        .container {
          display: flex;
          gap: 40px;
          align-items: center;
        }

        .preview {
          width: 100%; /* 이미지 꽉 채우기 */
          height: auto;
        }

        .genres {
          grid-template-columns: repeat(1, 1fr); /* 2열 → 1열 */
        }

        .buttons {
          text-align: center;
        }

        button {
          width: 100%; /* 버튼 꽉 채우기 */
          margin-top: 10px;
        }

        .top-header {
          flex-direction: column; /* 나가기 + 제목 세로 */
          align-items: flex-start;
          gap: 5px;
        }
      }
      @media (min-width: 768px) and (max-width: 1080px) {
        .container {
          flex-direction: row; /* 다시 가로 */
          gap: 20px;
        }

        .left,
        .right {
          display: flex;
          flex-direction: column;
          gap: 10px;
        }
        .preview {
          width: 120px;
          height: 160px;
        }

        .wrapper {
          padding: 0 20px;
        }

        input,
        textarea {
          font-size: 14px;
        }
        label {
          margin-top: 10px;
          display: block;
        }

        #ratingRange {
          flex: 0 0 180px;
        }
        .genres {
          gap: 10px 20px;
        }
      }
    </style>
  </head>

  <body>
    <div class="wrapper">
      <div class="top-header">
        <span class="back-btn" onclick="history.back()">← 나가기</span>
        <span class="title">영화 수정</span>
      </div>

      <div class="container">
        <!-- 좌측 -->
        <div class="left">
          <label>포스터 URL</label>
          <input id="poster" placeholder="이미지 URL 입력" />
          <input type="file" id="file" />
          <img id="preview" class="preview" />

          <label>영화 제목</label>
          <input id="title" placeholder="영화 제목을 입력하세요" />

          <label>별점</label>
          <div class="rating-box">
            <input
              type="range"
              id="ratingRange"
              min="0"
              max="5"
              step="0.5"
              value="0"
            />
            <span id="ratingValue">⭐ 0</span>
          </div>

          <label>개봉 연도</label>
          <input id="year" placeholder="예: 2024" />

          <label>장르</label>
          <div class="genres">
            <label
              ><input type="checkbox" value="animation" /><span
                >애니메이션</span
              ></label
            >
            <label
              ><input type="checkbox" value="comedy" /><span
                >코미디</span
              ></label
            >
            <label
              ><input type="checkbox" value="romance" /><span
                >로맨스</span
              ></label
            >
            <label
              ><input type="checkbox" value="action_thriller_crime" /><span
                >액션 / 스릴러 / 범죄</span
              ></label
            >
            <label
              ><input type="checkbox" value="horror" /><span>호러</span></label
            >
            <label
              ><input type="checkbox" value="sf_fantasy" /><span
                >SF / 판타지</span
              ></label
            >
            <label
              ><input type="checkbox" value="drama" /><span>드라마</span></label
            >
            <label
              ><input type="checkbox" value="documentary" /><span
                >다큐멘터리</span
              ></label
            >
            <label
              ><input type="checkbox" value="music_musical" /><span
                >음악 / 뮤지컬</span
              ></label
            >
            <label
              ><input type="checkbox" value="etc" /><span>기타</span></label
            >
          </div>

          <label>감독</label>
          <input
            id="director"
            placeholder="감독 이름 입력 (여러 명은 ,로 구분)"
          />

          <label>출연진</label>
          <input id="actors" placeholder="출연진 입력 (여러 명은 ,로 구분)" />
        </div>

        <!-- 우측 -->
        <div class="right">
          <label>명대사</label>
          <textarea id="description"></textarea>

          <label>내 리뷰</label>
          <textarea id="content"></textarea>
        </div>
      </div>

      <div class="buttons">
        <button class="cancel" onclick="history.back()">취소</button>
        <button class="submit" onclick="updateMovie()">수정하기</button>
      </div>
    </div>

    <script>
      const API = "https://api.fullstackfamily.com/api/buildup/v1/movies";
      const token = localStorage.getItem("token");

      const urlParams = new URLSearchParams(window.location.search);
      const postId = urlParams.get("id");

      let rating = 0;

      /*  별점 */
      const ratingRange = document.getElementById("ratingRange");
      const ratingText = document.getElementById("ratingValue");

      ratingRange.addEventListener("input", () => {
        rating = ratingRange.value;
        ratingText.innerText = "⭐ " + Number(rating).toFixed(1);
      });
      /*  미리보기 */
      document.getElementById("poster").addEventListener("input", (e) => {
        document.getElementById("preview").src = e.target.value;
      });

      /*  기존 데이터 불러오기 */
      async function getMovie() {
        const res = await fetch(`${API}/${postId}`, {
          headers: {
            Authorization: `Bearer ${token}`,
          },
        });

        const data = await res.json();
        const movie = data.data;

        poster.value = movie.imageUrl;
        preview.src = movie.imageUrl;
        title.value = movie.title;
        year.value = movie.year;
        director.value = movie.director?.join(", ") || "";
        actors.value = movie.cast?.join(", ") || "";
        description.value = movie.famousLine;
        content.value = movie.content;

        rating = movie.star;
        ratingRange.value = rating;
        ratingText.innerText = "⭐ " + rating;

        document.querySelectorAll("input[type=checkbox]").forEach((cb) => {
          if (movie.genre === cb.value) {
            cb.checked = true;
          }
        });
      }

      getMovie();

      /*  수정 */
      async function updateMovie() {
        let imageUrl = "";

        const fileInput = document.getElementById("file");

        if (fileInput && fileInput.files[0]) {
          const formData = new FormData();
          formData.append("file", fileInput.files[0]);

          const imgRes = await fetch(
            "https://api.fullstackfamily.com/api/buildup/v1/movies/images",
            {
              method: "POST",
              headers: {
                Authorization: `Bearer ${token}`,
              },
              body: formData,
            },
          );

          const imgData = await imgRes.json();
          imageUrl = imgData.data.imageUrl;
        }

        const genre = document.querySelector(
          "input[type=checkbox]:checked",
        )?.value;

        const body = {};

        // 값 있는 것만 추가
        if (title.value) body.title = title.value;
        if (genre) body.genre = genre;
        if (content.value) body.content = content.value;

        if (rating !== null && rating !== undefined) {
          body.star = Number(rating);
        }

        // 이미지
        if (imageUrl) body.imageUrl = imageUrl;
        else if (poster.value) body.imageUrl = poster.value;

        // 연도
        if (year.value) body.year = Number(year.value);

        // 감독
        if (director.value) {
          body.director = director.value.split(",").map((v) => v.trim());
        }

        // 출연진
        if (actors.value) {
          body.cast = actors.value.split(",").map((v) => v.trim());
        }

        // 명대사
        if (description.value) {
          body.famousLine = description.value;
        }

        try {
          const res = await fetch(`${API}/${postId}`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${token}`,
            },
            body: JSON.stringify(body),
          });

          if (!res.ok) throw new Error();

          alert("수정 완료!");
          location.href = `/detail.html?id=${postId}`;
        } catch (err) {
          alert("수정 실패");
        }
      }
      ratingText.innerText = "⭐ 0.0";
    </script>
  </body>
</html>
